{{- if .Values.api.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "secrets-bridge.componentName" (dict "ctx" . "component" "api") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secrets-bridge.componentLabels" (dict "ctx" . "component" "api") | nindent 4 }}
  annotations:
    {{- if and .Values.secrets.reloader.enabled .Values.secrets.existingSecret }}
    secret.reloader.stakater.com/reload: {{ .Values.secrets.existingSecret | quote }}
    {{- end }}
spec:
  replicas: {{ .Values.api.replicaCount }}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      {{- include "secrets-bridge.componentSelectorLabels" (dict "ctx" . "component" "api") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "secrets-bridge.componentSelectorLabels" (dict "ctx" . "component" "api") | nindent 8 }}
        {{- with .Values.api.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        # Force pod rollout when the env Secret rotates. The chart
        # doesn't own the Secret (it's pre-created by the operator
        # via ESO / terragrunt), so we hash a stable input the
        # operator updates whenever the bag changes.
        checksum/config: {{ printf "%s|%s|%s|%s|%s" .Values.env .Values.kms.backend (default "" .Values.secrets.existingSecret) (default "" .Values.api.config.oidc.issuer) (.Values.api.config.oidc.groupMap | toJson) | sha256sum }}
        {{- with .Values.api.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "secrets-bridge.componentServiceAccountName" (dict "ctx" . "component" "api" "spec" .Values.api.serviceAccount) }}
      {{- with .Values.api.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: {{ include "secrets-bridge.image" (dict "ctx" . "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          {{- with .Values.api.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.api.port }}
              protocol: TCP
          env:
            - name: API_ADDR
              value: ":{{ .Values.api.port }}"
            - name: SB_ENV
              value: {{ .Values.env | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.api.config.logLevel | quote }}
            - name: SB_GITOPS_ENABLED
              value: {{ .Values.api.config.gitopsEnabled | quote }}
            - name: SB_JWT_TOKEN_TTL
              value: {{ .Values.api.config.jwtTokenTTL | quote }}
            {{- with .Values.api.config.bootstrap.userId }}
            - name: SB_BOOTSTRAP_ADMIN_USER_ID
              value: {{ . | quote }}
            {{- end }}
            {{- /*
              Slice F — OIDC env vars are gated on `issuer` so a
              local-admin-only deployment doesn't carry dead
              env vars. The api binary's OIDC routes only mount
              when SB_OIDC_ISSUER is non-empty; everything else
              in this block is consumed by the same code path.
              Confidential bits (`SB_OIDC_CLIENT_SECRET`) live in
              the env Secret (`secrets.existingSecret`).
            */}}
            {{- with .Values.api.config.oidc }}
            {{- if .issuer }}
            - name: SB_OIDC_ISSUER
              value: {{ .issuer | quote }}
            {{- with .clientId }}
            - name: SB_OIDC_CLIENT_ID
              value: {{ . | quote }}
            {{- end }}
            {{- with .redirectUrl }}
            - name: SB_OIDC_REDIRECT_URL
              value: {{ . | quote }}
            {{- end }}
            {{- with .scopes }}
            - name: SB_OIDC_SCOPES
              value: {{ . | quote }}
            {{- end }}
            {{- with .postLogoutRedirect }}
            - name: SB_OIDC_POST_LOGOUT_REDIRECT
              value: {{ . | quote }}
            {{- end }}
            {{- with .groupClaim }}
            - name: SB_OIDC_GROUP_CLAIM
              value: {{ . | quote }}
            {{- end }}
            {{- /*
              Group-map → role mapping (Slice E). The reconciler
              ONLY touches user_roles rows with `granted_by =
              'system:oidc'`, so admin-assigned grants are safe.
              Serialize the YAML map to JSON for the api binary's
              `parseOIDCGroupMap` — an empty map stays empty {}
              which short-circuits the reconciler.
            */}}
            {{- if .groupMap }}
            - name: SB_OIDC_GROUP_MAP
              value: {{ .groupMap | toJson | quote }}
            {{- end }}
            {{- /*
              Slice H4 — OIDC `amr`-based MFA stamping. Default
              false post-H4 (the app's /auth/mfa/verify is the sole
              path that stamps `last_mfa_at`). Render the env var
              ONLY when the operator explicitly opted in so a
              default deployment doesn't carry a knob whose
              presence implies a different security posture.
            */}}
            {{- if .trustAmrForMFA }}
            - name: SB_OIDC_TRUSTED_AMR_MFA
              value: "true"
            {{- end }}
            {{- end }}
            {{- end }}
            {{- /*
              Slice J — App-level MFA (Slices H1–H5 + I1–I3).
              TOTP issuer always renders so authenticator apps see a
              consistent label across re-installs. WebAuthn vars
              only render when BOTH rpId AND rpOrigins are set —
              the api refuses to construct the relying party
              otherwise, so rendering half the config would just
              produce a boot-time error.
            */}}
            {{- with .Values.api.config.mfa }}
            {{- /*
              Slice K — login-time MFA gate. Default false renders
              no env var so existing step-up-only deployments are
              byte-for-byte unchanged.
            */}}
            {{- if .requireMFAAtLogin }}
            - name: SB_REQUIRE_MFA_AT_LOGIN
              value: "true"
            {{- end }}
            {{- with .totpIssuer }}
            - name: SB_MFA_TOTP_ISSUER
              value: {{ . | quote }}
            {{- end }}
            {{- if and .webauthn.rpId .webauthn.rpOrigins }}
            - name: SB_MFA_WEBAUTHN_RP_ID
              value: {{ .webauthn.rpId | quote }}
            {{- with .webauthn.rpDisplayName }}
            - name: SB_MFA_WEBAUTHN_RP_DISPLAY_NAME
              value: {{ . | quote }}
            {{- end }}
            - name: SB_MFA_WEBAUTHN_RP_ORIGINS
              value: {{ join "," .webauthn.rpOrigins | quote }}
            {{- end }}
            {{- end }}
            - name: SB_KMS_BACKEND
              value: {{ .Values.kms.backend | quote }}
            {{- if eq (lower .Values.kms.backend) "vault-transit" }}
            {{- with .Values.kms.vaultTransit.addr }}
            - name: SB_KMS_VAULT_ADDR
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kms.vaultTransit.mount }}
            - name: SB_KMS_VAULT_MOUNT
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kms.vaultTransit.key }}
            - name: SB_KMS_VAULT_KEY
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
            {{- if eq (lower .Values.kms.backend) "aws-kms" }}
            {{- with .Values.kms.awsKms.region }}
            - name: SB_KMS_AWS_REGION
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kms.awsKms.keyId }}
            - name: SB_KMS_AWS_KEY_ID
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.kms.awsKms.endpoint }}
            - name: SB_KMS_AWS_ENDPOINT
              value: {{ . | quote }}
            {{- end }}
            {{- end }}
          {{- if .Values.secrets.existingSecret }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.existingSecret }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- with .Values.api.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.api.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end -}}
