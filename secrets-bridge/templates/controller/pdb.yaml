{{- if and .Values.controller.enabled .Values.controller.podDisruptionBudget.enabled -}}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "secrets-bridge.componentName" (dict "ctx" . "component" "controller") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secrets-bridge.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
spec:
  minAvailable: {{ .Values.controller.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "secrets-bridge.componentSelectorLabels" (dict "ctx" . "component" "controller") | nindent 6 }}
{{- end -}}
