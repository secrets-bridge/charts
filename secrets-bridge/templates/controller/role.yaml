{{- if and .Values.controller.enabled .Values.controller.config.leaderElect -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "secrets-bridge.componentName" (dict "ctx" . "component" "controller") }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secrets-bridge.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
rules:
  # configmaps + leases — required by controller-runtime's leader
  # election; ConfigMap is the legacy lock, Lease is the modern one,
  # the binary uses both transparently.
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  # Events — the manager emits status events on reconcile failures.
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
{{- end -}}
