{{- if and .Values.controller.enabled .Values.controller.config.leaderElect -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "secrets-bridge.componentName" (dict "ctx" . "component" "controller") }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "secrets-bridge.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "secrets-bridge.componentName" (dict "ctx" . "component" "controller") }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "secrets-bridge.componentServiceAccountName" (dict "ctx" . "component" "controller" "spec" .Values.controller.serviceAccount) }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
