{{- if .Values.controller.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "secrets-bridge.componentName" (dict "ctx" . "component" "controller") }}
  labels:
    {{- include "secrets-bridge.componentLabels" (dict "ctx" . "component" "controller") | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "secrets-bridge.componentName" (dict "ctx" . "component" "controller") }}
subjects:
  - kind: ServiceAccount
    name: {{ include "secrets-bridge.componentServiceAccountName" (dict "ctx" . "component" "controller" "spec" .Values.controller.serviceAccount) }}
    namespace: {{ .Release.Namespace }}
{{- end -}}
