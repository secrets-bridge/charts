# Secrets Bridge — control plane Helm chart.
#
# Operator orientation:
#   1. Pick an `ingress.host` (the SPA + api both answer here).
#   2. Pick a `kms.backend` (`vault-transit` OR `aws-kms`) — defaults
#      below pin `vault-transit` so a forgotten override doesn't
#      silently boot LocalKMS (the api refuses to boot when
#      `kms.backend=local` AND `env != "dev"`).
#   3. Point the api at Postgres + Redis via `api.config.databaseUrl`
#      / `redisUrl` OR reference an existing Secret via
#      `secrets.existingSecret`.
#   4. Pre-create the env Secret with everything the api needs:
#      `SB_JWT_SECRET`, `SB_WRAP_MASTER_KEY` (dev only), DB / Redis
#      DSNs, and the KMS-specific knobs. See README "Required
#      secrets" for the exact key list per backend.

# ── Global ───────────────────────────────────────────────────────────

# Deployment mode. Recognised values:
#   "production" — LocalKMS REJECTED at boot; dev seeder skipped.
#                  This is the default.
#   "dev"        — LocalKMS allowed; the api seeds three users on
#                  first boot (admin/approver/requester).
#
# Threaded into every component's pod env as SB_ENV.
env: production

global:
  imageRegistry: ghcr.io
  # Image pull secrets the cluster ServiceAccount should reference.
  # Leave empty when pulling from a public registry like GHCR.
  imagePullSecrets: []
  # Cluster-wide labels merged onto every resource the chart renders.
  commonLabels: {}
  commonAnnotations: {}

# Override the inferred name (defaults to `secrets-bridge`).
nameOverride: ""
fullnameOverride: ""

# ── Required secrets ─────────────────────────────────────────────────
#
# By default the chart references an existing Kubernetes Secret that
# the operator pre-creates with every env var the api / worker need:
#
#   - SB_JWT_SECRET
#   - SB_WRAP_MASTER_KEY            (only when env=dev)
#   - DATABASE_URL
#   - REDIS_URL
#   - SB_KMS_VAULT_ADDR / TOKEN / KEY  (kms.backend=vault-transit)
#   - SB_KMS_AWS_REGION / KEY_ID       (kms.backend=aws-kms)
#
# Operators wiring through External Secrets Operator (ESO) point an
# ExternalSecret at this name and let the chart consume the result
# transparently — pull the bag from AWS Secrets Manager, HashiCorp
# Vault, or any other ESO backend; the chart only sees the
# Kubernetes Secret it produces.
secrets:
  existingSecret: secrets-bridge-env

  # Pod rollout on Secret rotation. The chart can't readily detect
  # ESO-driven updates to the referenced Secret (Helm reads cluster
  # state only at install/upgrade time). When `reloader.enabled` is
  # true the chart stamps the `stakater.com/reloader` annotation on
  # every Deployment that envFrom's the bag, and stakater/reloader
  # rolls the pods within ~30s of a Secret change.
  #
  # See https://github.com/stakater/Reloader. Install once per
  # cluster — the chart only adds the annotation; the reloader
  # controller is a cluster-wide singleton.
  reloader:
    enabled: true

# ── KMS ──────────────────────────────────────────────────────────────

kms:
  # SB_KMS_BACKEND. One of: vault-transit, aws-kms, local.
  # The `local` backend will REFUSE to boot unless `env=dev`. The
  # chart additionally refuses to render a manifest with the local
  # backend AND env=production via a templated check (see
  # _kms-validation.tpl).
  backend: vault-transit

  vaultTransit:
    # SB_KMS_VAULT_ADDR — only consulted when backend=vault-transit.
    # Leave empty to fall back to the `existingSecret` reference.
    addr: ""
    # SB_KMS_VAULT_MOUNT — defaults to "transit" in the api binary.
    mount: ""
    # SB_KMS_VAULT_KEY — the Vault transit key name. Required when
    # backend=vault-transit.
    key: ""

  awsKms:
    # SB_KMS_AWS_REGION — only consulted when backend=aws-kms.
    region: ""
    # SB_KMS_AWS_KEY_ID — CMK ARN, key id, or `alias/<name>`.
    keyId: ""
    # SB_KMS_AWS_ENDPOINT — optional (LocalStack / VPC endpoint).
    endpoint: ""

# ── api ──────────────────────────────────────────────────────────────

api:
  enabled: true
  image:
    repository: secrets-bridge/api
    tag: ""              # defaults to .Chart.AppVersion when empty
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 8080

  # IRSA: when backend=aws-kms, set this to the role ARN that grants
  # kms:Encrypt / Decrypt / GenerateDataKey on the configured CMK.
  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: true

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 512Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /readyz
      port: 8080
    initialDelaySeconds: 2
    periodSeconds: 5

  # Non-secret config; secret-bearing env vars are pulled from
  # `secrets.existingSecret` via envFrom.
  config:
    logLevel: info
    gitopsEnabled: false
    jwtTokenTTL: 8h

    # Local-admin bootstrap (architect Q1). Optional user-id grant
    # of the seed `admin` role on first boot. Email + password are
    # confidential and live in the env Secret as
    # SB_BOOTSTRAP_ADMIN_EMAIL / SB_BOOTSTRAP_ADMIN_PASSWORD.
    # `bootstrap.userId` is NOT a credential — it's the opaque user
    # id whose `user_roles` row gets created. Idempotent: once any
    # admin grant exists, the bootstrap is a no-op.
    bootstrap:
      userId: ""

    # OIDC client (architect Q4–Q6 + Slice E). When `oidc.issuer` is
    # empty, the OIDC routes are NOT mounted and the local-admin
    # /auth/login path stays the only sign-in surface.
    #
    # `clientSecret` is confidential → must live in the env Secret
    # (SB_OIDC_CLIENT_SECRET). The chart never renders it.
    oidc:
      # SB_OIDC_ISSUER. Authentik example:
      # https://authentik.example.com/application/o/secrets-bridge/
      issuer: ""
      # SB_OIDC_CLIENT_ID. Public identifier registered with the IdP.
      clientId: ""
      # SB_OIDC_REDIRECT_URL. Public callback URL; must match the
      # IdP's registered redirect for the client.
      redirectUrl: ""
      # SB_OIDC_SCOPES. Space-separated. Add `groups` explicitly if
      # your IdP requires it for the claim to appear.
      scopes: "openid profile email"
      # SB_OIDC_POST_LOGOUT_REDIRECT. Where the IdP sends users after
      # the end_session_endpoint redirect.
      postLogoutRedirect: ""

      # --- Group-claim → role mapping (Slice E) -----------------
      #
      # The reconciler runs on every OIDC sign-in. Removing a user
      # from `sb-admins` in the IdP revokes their admin grant at the
      # NEXT login — no manual sync.
      #
      # Critical invariant the api enforces (do NOT relax this in
      # any future "cleanup" — it IS the security boundary):
      #   The reconciler ONLY touches user_roles rows with
      #   `granted_by = 'system:oidc'`. Admin-assigned grants
      #   (SB_BOOTSTRAP_ADMIN_USER_ID, manually-curated team-scoped
      #   grants) are invisible to it and survive every reconcile
      #   pass, including the "no matching groups" case.

      # SB_OIDC_GROUP_CLAIM — ID-token claim carrying the user's
      # groups. Authentik / Keycloak / Okta default to "groups".
      groupClaim: groups

      # SB_OIDC_GROUP_MAP — IdP-group → Secrets Bridge role.
      # Example:
      #   groupMap:
      #     sb-admins:    admin
      #     sb-approvers: approver
      #     sb-devs:      developer
      # Empty map → reconciler short-circuits; JIT users get no
      # grants (admin assigns from the UI). The chart serializes
      # this map to JSON for the env var; the api validates the
      # shape at boot and FAILS LOUD on malformed JSON or empty
      # keys/values.
      groupMap: {}

      # SB_OIDC_TRUSTED_AMR_MFA (Slice H4 api decoupling).
      # When false (DEFAULT, post-H4 architectural pivot), the
      # OIDC callback records `amr` in the audit metadata but
      # does NOT stamp `last_mfa_at` on the session. The app's
      # own /auth/mfa/{challenge,verify} is the SOLE path that
      # marks a session MFA-fresh.
      # When true, the legacy Slice D behaviour is preserved:
      # the callback stamps `last_mfa_at` when the IdP's `amr`
      # claim carries an RFC 8176 strong factor. Operators
      # running an IdP that genuinely enforces MFA (Entra /
      # Okta with strong policy) flip this back to skip the
      # app-side step-up modal.
      # `amr` is recorded in audit either way — forensic
      # visibility doesn't depend on the trust knob.
      trustAmrForMFA: false

    # App-level MFA (Slices H1–H5 + I1–I3). The api owns enrollment
    # + step-up directly:
    #   /users/me/mfa/*             enrollment + management
    #   /auth/mfa/{challenge,verify} step-up
    #
    # TOTP works with zero config — the issuer renders into the
    # otpauth:// label that authenticator apps display under the
    # account name.
    #
    # WebAuthn is OFF by default — the relying-party config has no
    # safe defaults (the browser rejects ceremonies whose RPID
    # doesn't match the origin's eTLD+1). When both `rpId` and
    # `rpOrigins` are set the api mounts the WebAuthn routes; when
    # either is empty those routes return 503 and TOTP remains the
    # only enrollable factor.
    mfa:
      # SB_REQUIRE_MFA_AT_LOGIN (Slice K).
      # When true, EVERY authenticated route requires the session
      # to have been MFA-verified at least once (not just the
      # Tier-2 approve / reject / reveal paths). The SPA's onError
      # interceptor opens the step-up modal immediately after sign-
      # in; users with no factor enrolled are routed to /me/mfa.
      # When false (DEFAULT), the existing step-up-only model
      # applies — Tier-1 browsing only needs a session cookie.
      #
      # Carve-outs the api keeps open regardless: /users/me,
      # /users/me/mfa/*, /auth/logout, /auth/mfa/{challenge,verify}
      # — without those the gate would be self-locking.
      #
      # Operators who want the AWS-console / GitHub-org-2FA-required
      # posture flip this on. Deployments comfortable with step-up-
      # only on the value-bearing actions leave it off.
      requireMFAAtLogin: false

      # SB_MFA_TOTP_ISSUER — rendered into the otpauth:// URI's
      # `issuer=` param + the label prefix. Authenticator apps
      # display this under the user's account name. Override per
      # environment so operators running multiple environments
      # don't see two identically-named entries on their phone
      # (e.g. "Secrets Bridge (UAT)" / "Secrets Bridge (prod)").
      totpIssuer: "Secrets Bridge"

      webauthn:
        # SB_MFA_WEBAUTHN_RP_ID — effective domain (e.g.
        # `sb.example.com`). MUST be the eTLD+1 of the SPA's
        # origin or the browser rejects the ceremony. Empty
        # value disables the WebAuthn routes at the api side.
        rpId: ""
        # SB_MFA_WEBAUTHN_RP_DISPLAY_NAME — free text rendered in
        # the authenticator's enrollment dialog ("Add Secrets
        # Bridge?"). Falls back to "Secrets Bridge" when empty.
        rpDisplayName: "Secrets Bridge"
        # SB_MFA_WEBAUTHN_RP_ORIGINS — list of fully-qualified
        # origins permitted for the ceremony. Production deploys
        # typically list one entry (the SPA's https origin);
        # local dev adds http://localhost:5173 for Vite. The api
        # rejects WebAuthn responses whose origin isn't in the
        # list. Empty list disables the WebAuthn routes at the
        # api side.
        rpOrigins: []

  # Horizontal pod autoscaler. Off by default; flip enabled when the
  # metrics-server / Prometheus adapter is wired.
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  networkPolicy:
    enabled: false

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── ui ───────────────────────────────────────────────────────────────

ui:
  enabled: true
  image:
    repository: secrets-bridge/ui
    tag: ""              # defaults to .Chart.AppVersion when empty
    pullPolicy: IfNotPresent
  replicaCount: 2
  port: 8080            # nginx in the official image listens on 8080

  serviceAccount:
    create: true
    name: ""
    annotations: {}

  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 101
    fsGroup: 101
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop: [ALL]

  livenessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 5
    periodSeconds: 10

  readinessProbe:
    httpGet:
      path: /
      port: 8080
    initialDelaySeconds: 2
    periodSeconds: 5

  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── Shared ingress ───────────────────────────────────────────────────
#
# One Ingress object fronts BOTH ui and api on the SAME host. Path
# routing:
#   /api/v1/*           → api Service
#   /healthz, /readyz   → api Service (probe pass-through)
#   /metrics            → api Service (Prometheus scrape, but you
#                                       probably want NetworkPolicy
#                                       blocking external access)
#   / (catch-all)       → ui Service
#
# Same-origin posture means the SPA calls `/api/v1/*` relative to its
# own host — no CORS, no separate domain, one TLS cert.

ingress:
  enabled: true
  className: nginx
  host: secrets-bridge.example.com
  annotations: {}
  # Path prefixes routed to the api. Adjust if your reverse proxy
  # rewrites paths.
  apiPaths:
    - /api
    - /healthz
    - /readyz
    - /metrics
  # All non-api traffic falls through to the ui.
  uiPath: /
  tls:
    enabled: true
    secretName: secrets-bridge-tls
    # Set to "" when bringing your own pre-issued cert; otherwise
    # cert-manager.io/cluster-issuer: <name> is added.
    clusterIssuer: ""

# ── worker ───────────────────────────────────────────────────────────
#
# Background sweepers + the GitOps observation poller. The worker
# shares the api's env Secret (DATABASE_URL, REDIS_URL, KMS knobs)
# but never exposes a service — its probes listen on loopback only.

worker:
  enabled: true
  image:
    repository: secrets-bridge/worker
    tag: ""              # defaults to .Chart.AppVersion when empty
    pullPolicy: IfNotPresent
  # The worker uses a per-sweeper Redis lock for leader election;
  # replicas > 1 is supported (N-1 will silently skip ticks).
  replicaCount: 1

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: true

  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 256Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]

  # Probes addressability.
  #
  # The worker binds an HTTP listener for /healthz + /readyz + /metrics.
  # `bindAddress` is the address it listens on inside the pod, plumbed
  # into the container as SB_WORKER_LOCAL_ADDR.
  #
  # IMPORTANT: kubelet runs httpGet probes from the NODE's network
  # namespace (not the pod's). If the listener binds 127.0.0.1 and the
  # probe is also 127.0.0.1, the kubelet hits the node's loopback —
  # nothing answers and the worker stays NotReady forever.
  #
  # The chart defaults to 0.0.0.0 so the probe (running on the node)
  # can reach the listener via the pod IP. The worker still has NO
  # Service in front of it — the only reachability into 0.0.0.0:8091
  # is from inside the pod's netns OR via the pod IP from the same VPC
  # (which a NetworkPolicy in the same chart blocks by default).
  #
  # If you want the strict loopback-only posture (BRD §15 — agent has
  # no inbound listener), set `bindAddress: 127.0.0.1` AND switch
  # `livenessProbe`/`readinessProbe` to an `exec` probe. That
  # requires a base image with a shell + wget/curl; the default
  # distroless/static doesn't carry one, so the chart's default
  # posture is pod-IP probing.
  probesPort: 8091
  bindAddress: 0.0.0.0
  livenessProbe:
    httpGet:
      path: /healthz
      port: 8091
    initialDelaySeconds: 5
    periodSeconds: 10
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8091
    initialDelaySeconds: 2
    periodSeconds: 5

  # Non-secret config; secret-bearing env vars come from
  # `secrets.existingSecret` via envFrom (same bag as the api).
  config:
    logLevel: info
    # Mirror the api's GitOps flag — BOTH sides must agree.
    gitopsEnabled: false
    # Sweep cadences. Defaults match the worker binary; uncomment to
    # override.
    # wrapsExpiredInterval: 1m
    # secretsStaleInterval: 5m
    # agentsStaleInterval: 1m
    # jobsRecoveryInterval: 30s
    # discoverInterval: 1h
    # secretsStaleAfter: 24h
    # agentsStaleAfter: 5m
    # gitopsPollInterval: 15s
    # gitopsTimeoutInterval: 1m
    # gitopsHttpTimeout: 15s
    # gitopsBatchSize: 20

  # Notifications. Set `webhookUrl` to the channel that should
  # receive sweeper failures; flip slackFormat to true for the
  # `{"text": "..."}` envelope that Slack inbound webhooks expect.
  notifications:
    webhookUrl: ""
    slackFormat: false

  # SB_DISCOVER_TARGETS_JSON — list of (cluster, provider, scope)
  # entries the discover scheduler enqueues jobs for. Format:
  #   [{"cluster":"prod-eu","provider":"vault","scope":{...}}, ...]
  # Empty disables the discover sweeper. Future PR: replace with a
  # provider_connections admin API (api repo).
  discoverTargetsJSON: ""

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ── controller ───────────────────────────────────────────────────────
#
# Kubernetes operator (kubebuilder) that reconciles SecretsSync CRs.
# Owns the cluster-scoped CRD `secretssyncs.sync.secrets-bridge.io`.
# Does NOT hold provider credentials or contact Postgres/Redis — it
# only VALIDATES that each CR's source + destination references
# parse cleanly; actual value movement happens via the agent
# elsewhere.

controller:
  enabled: true

  # CRD installation. When true, the chart renders the
  # `SecretsSync` CRD as part of the release. Switch to false in
  # environments where the CRD is managed out-of-band (e.g.
  # cluster-wide GitOps pipeline that pre-installs CRDs).
  installCRDs: true

  image:
    repository: secrets-bridge/controller
    tag: ""              # defaults to .Chart.AppVersion when empty
    pullPolicy: IfNotPresent
  replicaCount: 1

  serviceAccount:
    create: true
    name: ""
    annotations: {}
    automountServiceAccountToken: true

  resources:
    requests:
      cpu: 50m
      memory: 96Mi
    limits:
      cpu: 500m
      memory: 256Mi

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65532
    runAsGroup: 65532
    fsGroup: 65532
    seccompProfile:
      type: RuntimeDefault

  containerSecurityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: [ALL]

  # Manager flags. The defaults match the controller binary; flip
  # leaderElect=true when running replicaCount > 1, and set a
  # non-zero metricsAddr to scrape Prometheus.
  config:
    healthProbeAddr: ":8081"
    metricsAddr: "0"            # "0" disables metrics; ":8080" enables
    metricsSecure: true
    leaderElect: false
    enableHTTP2: false

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8081
    initialDelaySeconds: 15
    periodSeconds: 20
  readinessProbe:
    httpGet:
      path: /readyz
      port: 8081
    initialDelaySeconds: 5
    periodSeconds: 10

  # Metrics service. Off by default — flip enabled=true AND set
  # `controller.config.metricsAddr=:8080` together to expose the
  # /metrics endpoint cluster-internally.
  metricsService:
    enabled: false
    port: 8080

  podDisruptionBudget:
    enabled: false
    minAvailable: 1

  podAnnotations: {}
  podLabels: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
